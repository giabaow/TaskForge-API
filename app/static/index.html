<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Project Tracker</title><style>body{font:16px system-ui;margin:2rem auto;max-width:900px;color:#1f2937}input,button,select{padding:.55rem;margin:.2rem}button{cursor:pointer}section{border:1px solid #d1d5db;border-radius:8px;padding:1rem;margin-bottom:1rem}.project{padding:.6rem;border-bottom:1px solid #eee;cursor:pointer}.ticket{display:flex;align-items:center;gap:.6rem;padding:.6rem;border-bottom:1px solid #eee}.pill{font-size:.8rem;background:#e5e7eb;padding:.2rem .45rem;border-radius:99px}#app{display:none}#message{color:#b91c1c}</style></head><body>
<h1>Project Tracker</h1><p id="message"></p>
<section id="login"><h2>Log in</h2><input id="email" type="email" placeholder="Email"><input id="password" type="password" placeholder="Password"><button onclick="login()">Log in</button><p>Register via <a href="/docs">API docs</a> if you do not have an account yet.</p></section>
<main id="app"><button onclick="logout()">Log out</button><section><h2>Projects</h2><div id="projects"></div></section><section id="ticketSection"><h2 id="ticketTitle">Select a project</h2><div id="tickets"></div></section></main>
<script>
const api='/api/v1';let token=localStorage.getItem('token'),activeProject;
const headers=()=>({'Authorization':'Bearer '+token,'Content-Type':'application/json'});
function show(msg=''){document.querySelector('#message').textContent=msg;document.querySelector('#login').style.display=token?'none':'block';document.querySelector('#app').style.display=token?'block':'none'}
async function login(){let r=await fetch(api+'/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value,password:password.value})});if(!r.ok)return show('Login failed. Check your credentials.');token=(await r.json()).access_token;localStorage.setItem('token',token);show();loadProjects()}
function logout(){localStorage.removeItem('token');token=null;show()}
async function loadProjects(){let r=await fetch(api+'/projects',{headers:headers()});if(!r.ok)return show('Session expired. Please log in again.');let items=await r.json();projects.innerHTML=items.map(p=>`<div class="project" onclick="loadTickets(${p.id},'${p.name.replace(/'/g,"\\'")}')"><strong>${p.name}</strong><br><small>${p.description||''}</small></div>`).join('')||'No projects yet.'}
async function loadTickets(id,name){activeProject=id;ticketTitle.textContent='Tickets — '+name;let r=await fetch(api+'/projects/'+id+'/tickets',{headers:headers()});let items=await r.json();tickets.innerHTML=items.map(t=>`<div class="ticket"><strong>${t.title}</strong><span class="pill">${t.priority}</span><select onchange="changeStatus(${t.id},this.value)">${['backlog','todo','in_progress','in_review','done'].map(s=>`<option ${t.status===s?'selected':''}>${s}</option>`).join('')}</select></div>`).join('')||'No tickets in this project.'}
async function changeStatus(id,status){let r=await fetch(api+'/tickets/'+id,{method:'PATCH',headers:headers(),body:JSON.stringify({status})});if(!r.ok)alert('Could not update ticket');else loadTickets(activeProject,ticketTitle.textContent.replace('Tickets — ',''))}
show();if(token)loadProjects();
</script></body></html>
